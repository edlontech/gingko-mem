on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to (re)build binaries for (e.g. gingko-v0.1.0). Builds from the current branch head."
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

name: Release Flow

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: "Prepare Release"
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

  build-release:
    needs: release-please
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos_silicon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.4"
          otp-version: "28.3"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (Yarn)
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install xz (macOS)
        if: runner.os == 'macOS'
        run: brew install xz

      - name: Build Burrito release (${{ matrix.target }})
        run: just build-target ${{ matrix.target }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || needs.release-please.outputs.tag_name }}
          token: ${{ steps.app-token.outputs.token }}
          draft: true
          files: burrito_out/*

  checksums:
    needs: [release-please, build-release]
    if: |
      always() &&
      needs.build-release.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Download release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p assets
          gh release download "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --dir assets

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum * > ../SHA256SUMS

      - name: Upload SHA256SUMS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || needs.release-please.outputs.tag_name }}
          token: ${{ steps.app-token.outputs.token }}
          draft: true
          files: SHA256SUMS

  publish-release:
    needs: [release-please, build-release, checksums]
    if: |
      always() &&
      needs.build-release.result == 'success' &&
      needs.checksums.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
